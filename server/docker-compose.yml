services:
  xkc:
    build: .
    container_name: xkc-server
    restart: unless-stopped
    network_mode: host
    environment:
      XKC_DATA_DIR: /data
      XKC_PORT: 3001
      XKC_PUBLIC_URL: ${XKC_PUBLIC_URL:-http://localhost:3001}
      XKC_SECRET_KEY: ${XKC_SECRET_KEY:?XKC_SECRET_KEY is required}
      XKC_ADMIN_USERNAME: ${XKC_ADMIN_USERNAME:-admin}
      XKC_ADMIN_PASSWORD: ${XKC_ADMIN_PASSWORD:-changeme}
      XKC_MAX_UPLOAD_MB: ${XKC_MAX_UPLOAD_MB:-500}
      XKC_ANALYSIS_WORKERS: ${XKC_ANALYSIS_WORKERS:-2}
      XKC_SPOTIFY_CLIENT_ID: ${XKC_SPOTIFY_CLIENT_ID:-}
      XKC_SPOTIFY_CLIENT_SECRET: ${XKC_SPOTIFY_CLIENT_SECRET:-}
    volumes:
      - xkc_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  xkc_data:
    name: xkc_data
