name: Desktop Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: 'macOS Apple Silicon'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: 'macOS Intel'
          - platform: ubuntu-22.04
            args: ''
            label: 'Linux x64'
          - platform: windows-latest
            args: ''
            label: 'Windows x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install desktop npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: XKC ${{ github.ref_name }}
          releaseBody: |
            ## XKC ${{ github.ref_name }}

            ### Desktop App Downloads

            **macOS**
            - Apple Silicon (M1/M2/M3/M4): `XKC_${{ github.ref_name }}_aarch64.dmg`
            - Intel: `XKC_${{ github.ref_name }}_x64.dmg`

            **Windows**
            - Windows 10/11 x64: `XKC_${{ github.ref_name }}_x64-setup.exe`

            **Linux**
            - AppImage (x64): `XKC_${{ github.ref_name }}_amd64.AppImage`

            ---
            The desktop app connects to your self-hosted XKC server.
            Enter your server URL on first launch (e.g. `http://your-server:3002`).

            ### Server
            Docker: `docker pull ghcr.io/tuikat/xkc-server:${{ github.ref_name }}`

            See the [README](https://github.com/tuikat/xkc) for server setup.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
